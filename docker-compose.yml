services:
  apple-caldav-mcp:
    build:
      context: .
      dockerfile: docker/apple-caldav-mcp/Dockerfile
    restart: unless-stopped
    environment:
      APPLE_CALDAV_URL: ${APPLE_CALDAV_URL:-https://caldav.icloud.com}
      APPLE_CALDAV_USERNAME: ${APPLE_CALDAV_USERNAME:-}
      APPLE_CALDAV_APP_PASSWORD: ${APPLE_CALDAV_APP_PASSWORD:-}
      MCP_BEARER_TOKEN: ${CALDAV_MCP_BEARER_TOKEN:-}
      PORT: 3000

  hermes-gateway:
    image: ${HERMES_IMAGE}
    container_name: hermes
    restart: unless-stopped
    volumes:
      - ${HERMES_DATA_DIR}:/opt/data
      - ${OBSIDIAN_VAULT_HOST_PATH:-${HERMES_DATA_DIR}/vault}:/opt/data/vault:cached
      - ./scripts/patches/api_server.py:/opt/hermes/gateway/platforms/api_server.py:ro
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: ${HERMES_DASHBOARD_PORT:-9119}
      HERMES_DASHBOARD_INSECURE: "true"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OBSIDIAN_VAULT_PATH: /opt/data/vault
    ports:
      - ${HERMES_DASHBOARD_PORT:-9119}:9119
    command: ["gateway", "run"]

  hermes-auxiliary-bridge:
    image: ${HERMES_IMAGE}
    restart: unless-stopped
    volumes:
      - ${HERMES_DATA_DIR}:/opt/data
      - ./scripts/auxiliary-bridge.py:/opt/auxiliary-bridge.py:ro
    environment:
      HERMES_API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      PORT: 8750
    command: ["python3", "/opt/auxiliary-bridge.py"]

  messaging-api:
    build:
      context: ./messaging-api
    restart: unless-stopped
    depends_on:
      - hermes-gateway
      - hermes-auxiliary-bridge
    environment:
      PORT: 3000
      JWT_SECRET: ${MESSAGING_API_JWT_SECRET:-change-me}
      HERMES_BASE_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      HERMES_AUXILIARY_BRIDGE_URL: http://hermes-auxiliary-bridge:8750
      DB_PATH: /opt/data/messaging-api.sqlite
      MESSAGING_API_HOST: ${MESSAGING_API_HOST:-}
      INVITE_EXPIRY_HOURS: ${INVITE_EXPIRY_HOURS:-48}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-12}
      COMPANION_MCP_BEARER_TOKEN: ${COMPANION_MCP_BEARER_TOKEN:-}
      CRON_WEBHOOK_BEARER: ${CRON_WEBHOOK_BEARER:-}
      CRON_OUTPUT_DIR: ${CRON_OUTPUT_DIR:-/opt/data/cron/output}
      CRON_OUTPUT_POLL_MS: ${CRON_OUTPUT_POLL_MS:-5}
      ADDRESS_ENRICHMENT_SESSION_ID: ${ADDRESS_ENRICHMENT_SESSION_ID:-companion-address-enrichment}
      TITLE_GENERATION_TIMEOUT_MS: ${TITLE_GENERATION_TIMEOUT_MS:-30000}
      PROVIDER_MODELS_CACHE_PATH: ${PROVIDER_MODELS_CACHE_PATH:-/opt/data/provider_models_cache.json}
    volumes:
      - ${HERMES_DATA_DIR}:/opt/data
    ports:
      - ${MESSAGING_API_PORT:-3000}:3000
