        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/health/daily-summaries:
    post:
      tags: [data-health]
      summary: Upsert a health daily summary
      description: |
        Ingests or updates a user-scoped health daily summary for a local calendar
        day. Upserts on `(user_id, date)`. When a day is finalized (`partial: false`),
        subsequent upserts with `partial: true` are rejected with `409 day_finalized`.
        Idempotent re-sync with `partial: false` on an already finalized day is allowed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertHealthDailySummaryRequest'
      responses:
        '204':
          description: Summary accepted
        '400':
          description: Invalid payload or metric validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot reopen a finalized day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                day_finalized:
                  value: { error: day_finalized }

    get:
      tags: [data-health]
      summary: List health daily summary history
      description: |
        Returns a paginated window of health daily summaries for the authenticated
        user, newest days first. Default `limit=20`. Follow `_links.next` for older
        days and `_links.prev` for newer days.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: before
          in: query
          description: Summary id — return days older than this anchor
          schema:
            type: string
            format: uuid
        - name: after
          in: query
          description: Summary id — return days newer than this anchor
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated history (newest first)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDailySummaryListResponse'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data/health/daily-summaries/latest:
    get:
      tags: [data-health]
      summary: Get latest health daily summary for the authenticated user
      description: |
